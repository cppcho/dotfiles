# Minimal herdr config, mapped from tmux muscle memory (~/.tmux.conf)
# Workspaces (spaces) are used like tmux windows; tabs are mostly unused.

[keys]
prefix = "ctrl+a"

goto = "prefix+v"
detach = "prefix+d"
workspace_picker = "prefix+w"
open_worktree = "prefix+g"
focus_pane_left = ""
focus_pane_down = ""
focus_pane_up = ""
focus_pane_right = ""
new_workspace = ""
previous_workspace = "ctrl+up"
next_workspace = "ctrl+down"      
previous_agent = "ctrl+left"
next_agent = "ctrl+right"
switch_workspace = "" 
focus_agent = ""
close_pane = "prefix+x"         

new_tab = "prefix+c"
previous_tab = ""
next_tab = ""
switch_tab = "ctrl+1..9"
close_tab = ""

split_vertical = "prefix+%"      # split right, tmux C-a %
split_horizontal = 'prefix+"'    # split down, tmux C-a "

# Navigate mode: j/k selects workspaces (vim-style); pane up/down moves to arrows
navigate_workspace_up = "k"
navigate_workspace_down = "j"
navigate_pane_up = "up"
navigate_pane_down = "down"

# Sessionizer: fzf a project dir; focus its space if open, else create one.
# ~ tmux C-a f (~/bin/tmux-sessionizer). Runs in a temp pane so fzf is interactive.
[[keys.command]]
key = "prefix+f"
type = "pane"
command = "~/bin/herdr-sessionizer"
description = "sessionizer (open project as space)"

# Vim-aware pane navigation, ~ tmux is_vim bindings (vim side in nvim config)
[[keys.command]]
key = "ctrl+h"
type = "shell"
command = "~/bin/herdr-navigate left"
description = "navigate left (vim-aware)"

[[keys.command]]
key = "ctrl+j"
type = "shell"
command = "~/bin/herdr-navigate down"
description = "navigate down (vim-aware)"

[[keys.command]]
key = "ctrl+k"
type = "shell"
command = "~/bin/herdr-navigate up"
description = "navigate up (vim-aware)"

[[keys.command]]
key = "ctrl+l"
type = "shell"
command = "~/bin/herdr-navigate right"
description = "navigate right (vim-aware)"

# Snap split to 36:64 / 64:36, ~ tmux C-a ( / ); splits first if single pane
[[keys.command]]
key = "prefix+("
type = "shell"
command = "~/bin/herdr-snap-split 0.36"
description = "snap split 36:64 (big right)"

[[keys.command]]
key = "prefix+)"
type = "shell"
command = "~/bin/herdr-snap-split 0.64"
description = "snap split 64:36 (big left)"

[[keys.command]]
key = "prefix+="
type = "shell"
command = "~/bin/herdr-snap-split 0.5"
description = "snap split 50:50"

[theme]
name = "catppuccin"              # = mocha

[ui]
hide_tab_bar_when_single_tab = true  # tabs unused; hide the row
agent_panel_sort = "spaces"
confirm_close = true
show_agent_labels_on_pane_borders = false
prompt_new_tab_name = false

[ui.toast]
delivery = "herdr"
