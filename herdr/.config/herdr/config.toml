onboarding = false
# Minimal herdr config, mapped from tmux muscle memory (~/.tmux.conf)
# Workspaces (spaces) are used like tmux windows; tabs are mostly unused.

[keys]
prefix = "ctrl+a"

goto = ""
detach = "prefix+d"
workspace_picker = "prefix+w"
# prefix+g / prefix+shift+g are driven by ~/bin/gwt (see [[keys.command]] below),
# ported from tmux. Disable herdr's native worktree actions so the keys are free.
open_worktree = ""
new_worktree = ""
focus_pane_left = ""
focus_pane_down = ""
focus_pane_up = ""
focus_pane_right = ""
new_workspace = ""
previous_workspace = "ctrl+["
next_workspace = "ctrl+]"
previous_agent = "ctrl+;"
next_agent = "ctrl+'"
close_pane = "prefix+x"
close_workspace = "prefix+shift+x"

new_tab = "prefix+c"
previous_tab = ""
next_tab = ""
close_tab = ""

split_vertical = "prefix+%"
split_horizontal = 'prefix+"'

navigate_workspace_up = "k"
navigate_workspace_down = "j"
navigate_pane_up = "up"
navigate_pane_down = "down"

switch_workspace = "" 
switch_tab = "ctrl+1..9"

[[keys.command]]
key = "prefix+f"
type = "pane"
command = "~/bin/herdr-sessionizer"
description = "sessionizer (open project as space)"

# gwt worktree switching, ported from tmux prefix g / G.
[[keys.command]]
key = "prefix+g"
type = "pane"
command = "~/bin/herdr-gwt-switch"
description = "worktree switch (gwt fzf picker)"

[[keys.command]]
key = "prefix+shift+g"
type = "pane"
command = "~/bin/herdr-gwt-prompt"
description = "worktree switch (branch/#pr/url)"

[[keys.command]]
key = "ctrl+h"
type = "shell"
command = "~/bin/herdr-navigate left"
description = "navigate left (vim-aware)"

[[keys.command]]
key = "ctrl+j"
type = "shell"
command = "~/bin/herdr-navigate down"
description = "navigate down (vim-aware)"

[[keys.command]]
key = "ctrl+k"
type = "shell"
command = "~/bin/herdr-navigate up"
description = "navigate up (vim-aware)"

[[keys.command]]
key = "ctrl+l"
type = "shell"
command = "~/bin/herdr-navigate right"
description = "navigate right (vim-aware)"

[[keys.command]]
key = "prefix+("
type = "shell"
command = "~/bin/herdr-snap-split 0.36"
description = "snap split 36:64 (big right)"

[[keys.command]]
key = "prefix+)"
type = "shell"
command = "~/bin/herdr-snap-split 0.64"
description = "snap split 64:36 (big left)"

[[keys.command]]
key = "prefix+shift+o"
type = "shell"
command = "~/bin/herdr-close-other-tabs"
description = "close all other tabs in workspace"

[[keys.command]]
key = "prefix+="
type = "shell"
command = "~/bin/herdr-evenize"
description = "evenize all splits (equal panes)"

[theme]
name = "catppuccin"

[ui]
hide_tab_bar_when_single_tab = false
agent_panel_sort = "spaces"
confirm_close = false
show_agent_labels_on_pane_borders = true
prompt_new_tab_name = false

[ui.toast]
delivery = "herdr"
