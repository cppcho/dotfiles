display_information:
  name: Things Sync
  description: React to a Slack message to save it as a to-do in macOS Things.
features:
  bot_user:
    display_name: things-sync
    always_online: true
oauth_config:
  scopes:
    bot:
      - reactions:read
      - channels:history
      - groups:history
      - im:history
      - mpim:history
settings:
  event_subscriptions:
    bot_events:
      - reaction_added
  interactivity:
    is_enabled: false
  socket_mode_enabled: true
  org_deploy_enabled: false
  token_rotation_enabled: false
